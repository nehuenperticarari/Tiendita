    <main class="container">
        <h2 class="center">Contact <span>Form</span></h2>

        <form class="contact-form"  method="post">
            <fieldset>
                <legend>Personal Data</legend>

                <div class="field">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" placeholder="Your name" required>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" name="name" id="email" placeholder="Your email" required>
                </div>

                <div class="field">
                    <label for="phone">Phone</label>
                    <input type="tel" name="name" id="phone" placeholder="Your numbrer" required>
                </div>

                <div class="field">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" cols="20" rows="10"></textarea>
                </div>

            </fieldset>

            <fieldset>
                <legend>Country</legend>
                <div class="field">
                    <label for="country">Country</label>
                    <select name="" id="country" required>
                        <option selected value="">-- select --</option>
                        <option value="ar">Argentina</option>
                        <option value="br">Brazil</option>
                        <option value="pr">Peru</option>
                        <option value="it">Italia</option>
                        <option value="es">Spain</option>
                    </select>

                </div>
            </fieldset>


            <fieldset>
                <legend>Another info</legend>
                <div class="field">
                    <label for="client">Client</label>
                    <input type="radio" id="client" name="type" value="client" required>
                </div>

                <div class="field">
                    <label for="supplier">Supplier</label>
                    <input type="radio" id="supplier" name="type" value="supplier" required>
                </div>

                <div class="field">
                    <label for="category">Category</label>
                    <input type="text" list="category" name="mycategory" required>
                    <datalist id="category">
                        <option value="bakery"></option>
                        <option value="vegetables and fruits"></option>
                        <option value="Candies"></option>

                    </datalist>

                </div>
            </fieldset>
            <input class="btn" type="submit" value="Sent">
        </form>
    </main>
